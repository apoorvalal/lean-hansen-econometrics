project:
  type: website
  output-dir: ../docs
  # Auto-stub generation is paused for fast iteration on walkthroughs.
  # Re-enable by adding "auto/**/*.qmd" back, and uncomment the
  # "Auto-generated reference" sidebar section below.
  render:
    - "index.qmd"
    - "walkthroughs/**/*.qmd"

website:
  title: "Hansen Econometrics in Lean"
  search:
    type: overlay
  repo-url: https://github.com/paulgp/lean-hansen-econometrics
  repo-actions: [source]
  sidebar:
    style: docked
    collapse-level: 2
    contents:
      - href: index.qmd
        text: Home
      - section: Walkthroughs
        contents:
          - section: Chapter 3
            contents:
              - walkthroughs/chapter3/theorem-3-2.qmd
              - walkthroughs/chapter3/theorem-3-5.qmd
          - section: Chapter 5
            contents:
              - walkthroughs/chapter5/theorem-5-5.qmd
              - walkthroughs/chapter5/quadratic-form-of-residual-variance.qmd
          - section: Chapter 7
            contents:
              - walkthroughs/chapter7/theorem-7-1.qmd
              - walkthroughs/chapter7/theorem-7-3.qmd
      # Auto-generated reference paused — re-enable along with `render:` above.
      # - section: Auto-generated reference
      #   contents:
      #     - href: auto/index.qmd
      #       text: Overview
      #     - auto: auto/*

format:
  html:
    theme: cosmo
    toc: true
    html-math-method: katex
    code-overflow: wrap

# Custom metadata consumed by build_stubs.py
github_repo: https://github.com/paulgp/lean-hansen-econometrics
