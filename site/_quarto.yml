project:
  type: website
  output-dir: ../docs
  # Auto-stub generation is paused for fast iteration on walkthroughs.
  # Re-enable by adding "auto/**/*.qmd" back, and uncomment the
  # "Auto-generated reference" sidebar section below.
  render:
    - "index.qmd"
    - "coverage.qmd"
    - "assumptions/**/*.qmd"
    - "walkthroughs/**/*.qmd"

website:
  title: "Hansen Econometrics in Lean"
  search:
    type: overlay
  repo-url: https://github.com/apoorvalal/lean-hansen-econometrics
  repo-subdir: site
  repo-actions: [source]
  sidebar:
    style: docked
    collapse-level: 2
    contents:
      - href: index.qmd
        text: Home
      - href: coverage.qmd
        text: Coverage
      - section: Assumptions
        contents:
          - href: assumptions/index.qmd
            text: Overview
          - href: assumptions/chapter2.qmd
            text: Chapter 2
          - href: assumptions/chapter3.qmd
            text: Chapter 3
          - href: assumptions/chapter4.qmd
            text: Chapter 4
          - href: assumptions/chapter5.qmd
            text: Chapter 5
          - href: assumptions/chapter7.qmd
            text: Chapter 7
      - section: Walkthroughs
        contents:
          - section: Chapter 2
            contents:
              - walkthroughs/chapter2/best-predictor.qmd
              - walkthroughs/chapter2/variance-decomposition.qmd
              - walkthroughs/chapter2/linear-projection-minimizes-mse.qmd
              - walkthroughs/chapter2/linear-projection-covariance-formula.qmd
          - section: Chapter 3
            contents:
              - walkthroughs/chapter3/theorem-3-2.qmd
              - walkthroughs/chapter3/projection-matrices.qmd
              - walkthroughs/chapter3/fitted-residual-decomposition.qmd
              - walkthroughs/chapter3/residual-sum-zero.qmd
              - walkthroughs/chapter3/theorem-3-5.qmd
          - section: Chapter 5
            contents:
              - walkthroughs/chapter5/theorem-5-5.qmd
              - walkthroughs/chapter5/quadratic-form-of-residual-variance.qmd
          - section: Chapter 7
            contents:
              - walkthroughs/chapter7/theorem-7-1.qmd
              - walkthroughs/chapter7/theorem-7-3.qmd
      # Auto-generated reference paused — re-enable along with `render:` above.
      # - section: Auto-generated reference
      #   contents:
      #     - href: auto/index.qmd
      #       text: Overview
      #     - auto: auto/*

format:
  html:
    theme: cosmo
    css: styles.css
    toc: true
    html-math-method: katex
    code-overflow: wrap
    code-copy: true

# Custom metadata consumed by build_stubs.py
github_repo: https://github.com/apoorvalal/lean-hansen-econometrics
