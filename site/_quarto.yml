project:
  type: website
  output-dir: _site

website:
  title: "Hansen Econometrics in Lean"
  search:
    type: overlay
  repo-url: https://github.com/paulgp/lean-hansen-econometrics
  repo-actions: [source]
  sidebar:
    style: docked
    collapse-level: 2
    contents:
      - href: index.qmd
        text: Home
      - section: Walkthroughs
        contents:
          - walkthroughs/chapter5/theorem-5-7.qmd
      - section: Auto-generated reference
        contents:
          - href: auto/index.qmd
            text: Overview
          - auto: auto/*

format:
  html:
    theme: cosmo
    toc: true
    html-math-method: katex
    code-overflow: wrap

# Custom metadata consumed by build_stubs.py
github_repo: https://github.com/paulgp/lean-hansen-econometrics
